# Reference ResourceSlices for Tenstorrent card variants.
# The DRA driver must publish node-specific ResourceSlices from discovered
# hardware inventory; do not treat this file as proof that one node has all
# listed devices.
apiVersion: resource.k8s.io/v1
kind: ResourceSlice
metadata:
  name: ttsim-wormhole-n150d
  labels:
    app.kubernetes.io/name: tt-dra-driver
    app.kubernetes.io/component: dra-resource-slice
    tenstorrent.com/chip-series: wormhole
    tenstorrent.com/card-series: n150
    tenstorrent.com/card-model: n150d
spec:
  driver: tenstorrent.com/dra
  nodeName: ttsim-node
  pool:
    name: ttsim-node/wormhole-n150d
    generation: 1
    resourceSliceCount: 1
  devices:
  - name: tt-wormhole-n150d-0
    attributes:
      tenstorrent.com/chipSeries:
        string: wormhole
      tenstorrent.com/cardSeries:
        string: n150
      tenstorrent.com/cardModel:
        string: n150d
      tenstorrent.com/partNumber:
        string: TC-02002
      tenstorrent.com/aiClock:
        string: "1 GHz"
      tenstorrent.com/memoryType:
        string: GDDR6
      tenstorrent.com/externalPower:
        string: "1x 4+4-pin EPS12V"
      tenstorrent.com/connectivity:
        string: "2x Warp 100; 2x QSFP-DD 200G active"
      tenstorrent.com/systemInterface:
        string: "PCIe 4.0 x16"
      tenstorrent.com/cooling:
        string: "Active axial fan"
      tenstorrent.com/dimensions:
        string: "52.2mm x 256mm x 111mm"
    capacity:
      tenstorrent.com/asics:
        value: "1"
      tenstorrent.com/tensix-cores:
        value: "72"
      tenstorrent.com/sram-bytes:
        value: "108M"
      tenstorrent.com/memory-bytes:
        value: "12G"
      tenstorrent.com/memory-speed-gtps:
        value: "12"
      tenstorrent.com/memory-bandwidth-bytes-per-second:
        value: "288G"
      tenstorrent.com/fp8-teraflops:
        value: "262"
      tenstorrent.com/fp16-teraflops:
        value: "74"
      tenstorrent.com/blockfp8-teraflops:
        value: "148"
      tenstorrent.com/board-power-watts:
        value: "160"
---
