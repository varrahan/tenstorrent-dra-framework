apiVersion: resource.k8s.io/v1
kind: ResourceClaim
metadata:
  labels:
    app.kubernetes.io/component: dra-resource-claim
    app.kubernetes.io/name: tt-dra-driver
    tenstorrent.com/device-class: tenstorrent-wormhole-n150
  name: claim-wormhole-n150
spec:
  devices:
    requests:
    - exactly:
        allocationMode: ExactCount
        count: 1
        deviceClassName: tenstorrent-wormhole-n150
        selectors:
        - cel:
            expression: device.attributes["tenstorrent.com"].tensixTopology == "2dMesh"
              && device.attributes["tenstorrent.com"].tensixAllocation == "contiguousRegion"
              && device.attributes["tenstorrent.com"].gddrControllerLayout == "localizedControllers"
        - cel:
            expression: device.attributes["tenstorrent.com"].gddrControllersPerASIC
              == 6
      name: accelerator
---
